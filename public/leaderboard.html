<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlexCasino — Доска лидеров</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand-wrap" href="/"><div class="logo-circle">A</div><div><div class="brand">AlexCasino</div><div class="brand-sub">Community Hub</div></div></a>
      <nav class="top-nav">
        <a class="nav-link" href="/">Главная</a>
        <a class="nav-link active" href="/leaderboard.html">Лидеры</a>
        <a class="nav-link" href="/predictions.html">Предикты</a>
        <a class="nav-link" href="/giveaways.html">Розыгрыши</a>
      </nav>
      <div class="actions">
        <a class="btn primary" href="/account.html?provider=kick">Войти через Kick</a>
        <button id="reloadLeaderboard" class="btn">Обновить LIVE</button>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero-card">
      <p class="chip">Гонка рефералов</p>
      <h1 class="hero-title">Доска <span class="accent">лидеров</span></h1>
      <div class="counter" id="monthRangeOutput">До конца гонки: ...</div>
    </section>

    <section class="podium">
      <article class="podium-card" id="podium1"><p>#1</p><h3>—</h3><strong>$0</strong></article>
      <article class="podium-card" id="podium2"><p>#2</p><h3>—</h3><strong>$0</strong></article>
      <article class="podium-card" id="podium3"><p>#3</p><h3>—</h3><strong>$0</strong></article>
    </section>

    <section class="panel table-wrap" style="margin-top: 14px;">
      <h2 class="section-title">Полный рейтинг</h2>
      <table>
        <thead><tr><th>#</th><th>Игрок</th><th>Поставлено ($)</th></tr></thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </section>
  </main>

  <script src="/main.js"></script>
</body>
</html>
