<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlexCasino — Предикты</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand-wrap" href="/"><div class="logo-circle">A</div><div><div class="brand">AlexCasino</div><div class="brand-sub">Community Hub</div></div></a>
      <nav class="top-nav">
        <a class="nav-link" href="/">Главная</a>
        <a class="nav-link" href="/leaderboard.html">Лидеры</a>
        <a class="nav-link active" href="/predictions.html">Предикты</a>
        <a class="nav-link" href="/giveaways.html">Розыгрыши</a>
      </nav>
      <div class="actions"><a class="btn primary" href="/account.html?provider=telegram">Войти через Telegram</a></div>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div class="hero-card">
        <p class="chip">Бонусхант челлендж</p>
        <h1 class="hero-title">Прогноз <span class="accent">баланса</span></h1>
        <p class="hero-text">Впиши финальный баланс. Победит тот, кто ближе всех к итоговому значению.</p>
      </div>
      <div class="hero-card">
        <div class="stat-grid">
          <div class="stat-box"><h4>Текущий приз</h4><p>$50</p></div>
          <div class="stat-box"><h4>Статус</h4><p>Открыт</p></div>
        </div>
      </div>
    </section>

    <section class="grid-2" style="margin-top: 12px;">
      <div class="panel">
        <div class="row admin-only"><input id="pTitle" placeholder="Название раунда"><button id="createPrediction" class="btn">Создать</button></div>
        <div class="row"><input id="pId" type="number" min="1" placeholder="ID"><input id="pValue" type="number" min="0" placeholder="Ваш прогноз"><button id="submitPrediction" class="btn primary">Отправить</button></div>
        <div class="row admin-only"><input id="pCloseId" type="number" min="1" placeholder="ID"><input id="pFinal" type="number" min="0" placeholder="Финальное значение"><button id="closePrediction" class="btn ghost">Закрыть</button></div>
        <p id="predictionOutput" class="subtle"></p>
      </div>
      <div class="panel">
        <h2 style="margin-top:0">Лидеры предиктов</h2>
        <ul id="predictionList"></ul>
      </div>
    </section>
  </main>

  <script src="/main.js"></script>
</body>
</html>
