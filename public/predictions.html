<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AlexCasino — Предикты</title><link rel="stylesheet" href="/styles.css"></head><body>
<header class="topbar"><div class="topbar-inner"><div class="brand-wrap"><div class="logo-circle">A</div><div class="brand">AlexCasino</div></div><nav class="top-nav"><a class="nav-link" href="/">Главная</a><a class="nav-link" href="/leaderboard.html">Доска лидеров</a><a class="nav-link active" href="/predictions.html">Предикты</a><a class="nav-link" href="/giveaways.html">Розыгрыши</a><a class="nav-link" href="/account.html">Кабинет</a></nav></div></header>
<main class="page">
<section class="hero-card"><h1 class="hero-title">Прогноз <span class="accent">баланса</span></h1><p class="hero-text">Предскажите итог бонусханта. Побеждает самый близкий результат, при равенстве — кто отправил раньше.</p></section>
<section class="grid-2">
  <div class="panel">
    <div class="row admin-only"><input id="pTitle" placeholder="название"><button id="createPrediction" class="btn">Создать</button></div>
    <div class="row"><input id="pId" type="number" min="1" placeholder="ID"><input id="pValue" type="number" min="0" placeholder="Ваше значение"><button id="submitPrediction" class="btn primary">Отправить</button></div>
    <div class="row admin-only"><input id="pCloseId" type="number" min="1" placeholder="ID"><input id="pFinal" type="number" min="0" placeholder="Финальное"><button id="closePrediction" class="btn ghost">Закрыть</button></div>
    <p id="predictionOutput"></p>
  </div>
  <div class="panel"><h2 style="margin-top:0">Список лидеров</h2><ul id="predictionList"></ul></div>
</section>
</main><script src="/main.js"></script></body></html>
