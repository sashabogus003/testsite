<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AlexCasino — Розыгрыши</title><link rel="stylesheet" href="/styles.css"></head><body>
<header class="topbar"><div class="topbar-inner"><div class="brand-wrap"><div class="logo-circle">A</div><div class="brand">AlexCasino</div></div><nav class="top-nav"><a class="nav-link" href="/">Главная</a><a class="nav-link" href="/leaderboard.html">Доска лидеров</a><a class="nav-link" href="/predictions.html">Предикты</a><a class="nav-link active" href="/giveaways.html">Розыгрыши</a><a class="nav-link" href="/account.html">Кабинет</a></nav></div></header>
<main class="page">
<section class="hero-card"><h1 class="hero-title">Розыгрыши</h1><p class="hero-text">Участвуйте в активных розыгрышах. История прошлых розыгрышей и победителей хранится ниже.</p></section>
<section class="grid-3">
  <div class="stat-box"><h4>Активные</h4><p id="activeGiveaways">0</p></div>
  <div class="stat-box"><h4>Участников</h4><p id="giveawayParticipants">0</p></div>
  <div class="stat-box"><h4>Призовой фонд</h4><p id="giveawayPool">$0</p></div>
</section>
<section class="panel">
  <div class="row admin-only"><input id="gTitle" placeholder="название"><input id="gCost" type="number" min="0" placeholder="вход (поинты)"><button id="createGiveaway" class="btn">Создать</button></div>
  <div class="row"><input id="gJoinId" type="number" min="1" placeholder="ID розыгрыша"><button id="joinGiveaway" class="btn primary">Участвовать</button><button id="closeGiveaway" class="btn ghost admin-only">Закрыть</button></div>
  <p id="giveawayOutput"></p>
  <ul id="giveawayList"></ul>
</section>
</main><script src="/main.js"></script></body></html>
