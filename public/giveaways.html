<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlexCasino — Розыгрыши</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand-wrap" href="/"><div class="logo-circle">A</div><div><div class="brand">AlexCasino</div><div class="brand-sub">Community Hub</div></div></a>
      <nav class="top-nav">
        <a class="nav-link" href="/">Главная</a>
        <a class="nav-link" href="/leaderboard.html">Лидеры</a>
        <a class="nav-link" href="/predictions.html">Предикты</a>
        <a class="nav-link active" href="/giveaways.html">Розыгрыши</a>
      </nav>
      <div class="actions"><a class="btn primary" href="/account.html?provider=kick">Войти через Kick</a></div>
    </div>
  </header>

  <main class="page">
    <section class="hero-card">
      <p class="chip">Розыгрыши сообщества</p>
      <h1 class="hero-title">Розыгрыши</h1>
      <p class="hero-text">Участвуй в активных розыгрышах и получай награды за накопленные поинты.</p>
    </section>

    <section class="grid-3" style="margin-top: 12px;">
      <div class="stat-box"><h4>Активные</h4><p id="activeGiveaways">0</p></div>
      <div class="stat-box"><h4>Участников</h4><p id="giveawayParticipants">0</p></div>
      <div class="stat-box"><h4>Призовой фонд</h4><p id="giveawayPool">$0</p></div>
    </section>

    <section class="panel" style="margin-top: 12px;">
      <div class="row admin-only">
        <input id="gTitle" placeholder="Название розыгрыша">
        <input id="gCost" type="number" min="0" placeholder="Вход (поинты)">
        <button id="createGiveaway" class="btn">Создать</button>
      </div>

      <div class="row">
        <input id="gJoinId" type="number" min="1" placeholder="ID розыгрыша">
        <button id="joinGiveaway" class="btn primary">Участвовать</button>
        <button id="closeGiveaway" class="btn ghost admin-only">Закрыть (админ)</button>
      </div>

      <p id="giveawayOutput" class="subtle"></p>
      <ul id="giveawayList"></ul>
    </section>
  </main>

  <script src="/main.js"></script>
</body>
</html>
